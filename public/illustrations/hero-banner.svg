<svg width="2400" height="520" viewBox="0 0 2400 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Flat vector illustration of Midtown Sacramento with the gold Tower Bridge and the historic Marshall School among green trees">
  <!-- sky -->
  <rect width="2400" height="520" fill="#7AB6A4"/>
  <!-- clouds, varied shapes -->
  <g fill="#F7ECCC">
    <ellipse cx="260" cy="84" rx="66" ry="22"/><ellipse cx="316" cy="68" rx="40" ry="16"/>
    <path d="M880 96 a26 26 0 0 1 26 -26 a30 30 0 0 1 56 -8 a24 24 0 0 1 34 22 q0 12 -12 12 h-92 q-12 0 -12 -12 Z" transform="translate(0 -6)"/>
    <ellipse cx="1560" cy="66" rx="58" ry="19"/>
    <path d="M2080 110 a22 22 0 0 1 22 -22 a26 26 0 0 1 48 -7 a20 20 0 0 1 30 19 q0 10 -10 10 h-80 q-10 0 -10 -10 Z"/>
  </g>
  <!-- far downtown silhouette -->
  <g fill="#35917E">
    <rect x="60" y="230" width="64" height="180"/>
    <rect x="150" y="196" width="52" height="214"/>
    <path d="M420 410 v-160 h56 l14 -28 14 28 v160 Z"/>
    <rect x="620" y="240" width="66" height="170"/>
    <rect x="760" y="205" width="50" height="205"/>
    <path d="M950 410 v-190 h64 v-22 h14 v22 h10 v190 Z"/>
    <rect x="1420" y="225" width="58" height="185"/>
    <path d="M1540 410 v-150 h70 l16 -30 16 30 v150 Z"/>
    <rect x="2250" y="215" width="62" height="195"/>
    <rect x="2340" y="255" width="60" height="155"/>
  </g>
  <!-- Tower Bridge — right third, always visible beside the welcome card -->
  <g transform="translate(480 0)">
    <!-- deck -->
    <rect x="1020" y="330" width="520" height="16" fill="#E0B93E"/>
    <!-- left tower -->
    <g fill="#F3CB4A">
      <rect x="1120" y="128" width="18" height="218"/>
      <rect x="1170" y="128" width="18" height="218"/>
      <rect x="1114" y="120" width="80" height="16" rx="3"/>
      <rect x="1114" y="196" width="80" height="12"/>
      <rect x="1114" y="306" width="80" height="12"/>
      <rect x="1128" y="96" width="12" height="26"/><rect x="1168" y="96" width="12" height="26"/>
    </g>
    <path d="M1124 208 L1188 306 M1188 208 L1124 306" stroke="#F3CB4A" stroke-width="10"/>
    <!-- right tower -->
    <g fill="#F3CB4A">
      <rect x="1370" y="128" width="18" height="218"/>
      <rect x="1420" y="128" width="18" height="218"/>
      <rect x="1364" y="120" width="80" height="16" rx="3"/>
      <rect x="1364" y="196" width="80" height="12"/>
      <rect x="1364" y="306" width="80" height="12"/>
      <rect x="1378" y="96" width="12" height="26"/><rect x="1418" y="96" width="12" height="26"/>
    </g>
    <path d="M1374 208 L1438 306 M1438 208 L1374 306" stroke="#F3CB4A" stroke-width="10"/>
    <!-- side truss spans -->
    <path d="M1020 330 L1060 300 L1100 330 M1460 330 L1500 300 L1540 330" stroke="#E0B93E" stroke-width="10" fill="none"/>
  </g>
  <!-- tree canopy, varied forms -->
  <g fill="#368A59">
    <circle cx="90" cy="420" r="54"/>
    <path d="M240 470 q-60 0 -60 -46 q0 -34 34 -40 q6 -30 40 -30 q34 0 40 30 q34 6 34 40 q0 46 -60 46 Z"/>
    <circle cx="420" cy="430" r="46"/>
    <ellipse cx="580" cy="428" rx="58" ry="44"/>
    <path d="M760 470 q-52 0 -52 -40 q0 -30 30 -36 q6 -26 36 -26 q30 0 36 26 q30 6 30 36 q0 40 -52 40 Z" transform="translate(180 0)"/>
    <circle cx="1080" cy="438" r="42"/>
    <ellipse cx="1560" cy="432" rx="62" ry="46"/>
    <circle cx="2340" cy="430" r="52"/>
  </g>
  <g fill="#2B6E49">
    <ellipse cx="300" cy="452" rx="48" ry="34"/>
    <circle cx="680" cy="452" r="38"/>
    <ellipse cx="1240" cy="452" rx="52" ry="34"/>
    <circle cx="2220" cy="448" r="42"/>
  </g>
  <!-- Marshall School — far right, gold with fanlight -->
  <g transform="translate(2090 150)">
    <!-- roof -->
    <path d="M-24 130 L210 130 L186 92 L0 92 Z" fill="#0B3A38"/>
    <rect x="0" y="130" width="186" height="180" fill="#F3CB4A"/>
    <rect x="0" y="130" width="186" height="12" fill="#D9A72E"/>
    <!-- pediment + fanlight -->
    <path d="M48 92 L138 92 L130 56 L56 56 Z" fill="#F3CB4A"/>
    <path d="M93 4 a46 46 0 0 1 46 46 v8 h-92 v-8 a46 46 0 0 1 46 -46 Z" fill="#F3CB4A"/>
    <path d="M93 14 a36 36 0 0 1 36 36 v5 h-72 v-5 a36 36 0 0 1 36 -36 Z" fill="#F7ECCC"/>
    <g stroke="#0B3A38" stroke-width="3.5">
      <line x1="93" y1="55" x2="93" y2="18"/>
      <line x1="93" y1="55" x2="68" y2="28"/>
      <line x1="93" y1="55" x2="118" y2="28"/>
      <line x1="93" y1="55" x2="59" y2="44"/>
      <line x1="93" y1="55" x2="127" y2="44"/>
    </g>
    <!-- columns -->
    <rect x="52" y="196" width="10" height="80" fill="#F7ECCC"/>
    <rect x="124" y="196" width="10" height="80" fill="#F7ECCC"/>
    <!-- door -->
    <rect x="74" y="216" width="38" height="60" rx="3" fill="#0B3A38"/>
    <!-- windows -->
    <g fill="#0B3A38">
      <rect x="16" y="152" width="26" height="38" rx="2"/><rect x="144" y="152" width="26" height="38" rx="2"/>
      <rect x="16" y="212" width="26" height="38" rx="2"/><rect x="144" y="212" width="26" height="38" rx="2"/>
      <rect x="80" y="152" width="26" height="38" rx="2"/>
    </g>
    <!-- base -->
    <rect x="-10" y="276" width="206" height="34" fill="#0B4A44"/>
  </g>
  <!-- fall tree between bridge and school -->
  <g>
    <rect x="2036" y="400" width="12" height="60" fill="#7A4A21"/>
    <ellipse cx="2042" cy="380" rx="46" ry="52" fill="#EC8A1F"/>
    <ellipse cx="2018" cy="404" rx="22" ry="24" fill="#D9741A"/>
  </g>
  <!-- ground -->
  <rect y="452" width="2400" height="68" fill="#5DA145"/>
  <rect y="452" width="2400" height="10" fill="#4C8F3D"/>
  <!-- sand path -->
  <path d="M0 500 C 400 478 700 512 1100 492 C 1500 472 1900 508 2400 484 L2400 520 L0 520 Z" fill="#FBDD9F"/>
</svg>
