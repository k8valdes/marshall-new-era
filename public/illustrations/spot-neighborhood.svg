    </g>
    <circle cx="50" cy="-78" r="18" fill="#5DA145"/><circle cx="130" cy="-90" r="21" fill="#5DA145"/><circle cx="210" cy="-74" r="17" fill="#5DA145"/>
    <circle cx="40" cy="-66" r="8" fill="#EC8A1F"/><circle cx="140" cy="-78" r="9" fill="#EC8A1F"/><circle cx="218" cy="-62" r="7" fill="#EC8A1F"/>
