      <path d="M118 -14 c-16 -20 -16 -34 0 -45 c16 11 16 25 0 45 Z"/>
      <path d="M188 -14 c-16 -20 -16 -34 0 -45 c16 11 16 25 0 45 Z"/>
      <path d="M248 -14 c-16 -20 -16 -34 0 -45 c16 11 16 25 0 45 Z"/>
