<svg width="760" height="1000" viewBox="0 0 760 1000" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tall flat vector illustration of a Midtown block: the Tower Bridge and skyline above tree-lined Victorian homes, with neighbors and a dog on the sidewalk below">
  <!-- sky -->
